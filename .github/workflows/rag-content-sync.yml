name: RAG Content Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-rag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Identify changed files
        id: changes
        run: |
          # Get changed files between HEAD~1 and HEAD
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)

          # Filter to indexable extensions, skip lock files / binaries / .env
          FILES=$(echo "$CHANGED" | grep -E '\.(py|ts|js|tsx|jsx|md|json|yml|yaml|toml|sh|go|rs)$' \
            | grep -v -E '(package-lock\.json|yarn\.lock|pnpm-lock\.yaml|\.env|node_modules|\.git/)' \
            || true)

          if [ -z "$FILES" ]; then
            echo "No indexable files changed."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Files to index:"
            echo "$FILES"
            echo "$FILES" > /tmp/changed_files.txt
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Index changed files to RAG
        if: steps.changes.outputs.has_files == 'true'
        env:
          RAG_URL: https://rag-mcp-server-rsc32eci6a-ew.a.run.app/mcp
          RAG_AUTH_TOKEN: ${{ secrets.RAG_AUTH_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # NOTE: REPO_NAME comes from github.repository which is owner/repo
          # format (e.g. craigdanielk/RAG-System). This is safe — it's a
          # GitHub-controlled value, not user-supplied input.
          PROJECT=$(echo "$REPO_NAME" | awk -F/ '{print $NF}')

          AUTH_HEADER=""
          if [ -n "$RAG_AUTH_TOKEN" ]; then
            AUTH_HEADER="Authorization: Bearer $RAG_AUTH_TOKEN"
          fi

          # Initialize MCP session
          curl -sf -D /tmp/headers -X POST "$RAG_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
            -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"rag-content-sync","version":"1.0"}},"id":1}' \
            > /dev/null

          SESSION_HEADER=$(grep -i "mcp-session-id" /tmp/headers | tr -d '\r' | awk '{print $2}')
          echo "MCP Session: $SESSION_HEADER"

          # Send initialized notification
          curl -sf -X POST "$RAG_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "Mcp-Session-Id: $SESSION_HEADER" \
            ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            > /dev/null

          # Index each changed file
          INDEXED=0
          FAILED=0
          REQUEST_ID=2

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            [ ! -f "$FILE" ] && echo "Skipped (deleted): $FILE" && continue

            FILE_SIZE=$(wc -c < "$FILE")
            if [ "$FILE_SIZE" -gt 500000 ]; then
              echo "Skipped (too large): $FILE"
              continue
            fi

            CONTENT=$(cat "$FILE")
            FULL_PATH="${REPO_NAME}/${FILE}"

            PAYLOAD=$(jq -n \
              --arg content "$CONTENT" \
              --arg file_path "$FULL_PATH" \
              --arg project "$PROJECT" \
              --argjson id "$REQUEST_ID" \
              '{
                jsonrpc: "2.0",
                method: "tools/call",
                params: {
                  name: "rag_index_content",
                  arguments: {
                    input: {
                      content: $content,
                      file_path: $file_path,
                      project: $project,
                      force: true
                    }
                  }
                },
                id: $id
              }')

            RESULT=$(curl -sf -X POST "$RAG_URL" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -H "Mcp-Session-Id: $SESSION_HEADER" \
              ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
              -d "$PAYLOAD" 2>&1) || true

            # SSE responses wrap JSON in "data: {...}" lines
            # Check for isError:true (tool error) or Unknown tool
            if echo "$RESULT" | grep -q '"isError":true'; then
              FAILED=$((FAILED + 1))
              echo "Failed: $FILE — $(echo "$RESULT" | grep '^data:' | head -1)"
            elif echo "$RESULT" | grep -q '"error"'; then
              FAILED=$((FAILED + 1))
              echo "Failed: $FILE — $(echo "$RESULT" | grep '^data:' | head -1)"
            else
              INDEXED=$((INDEXED + 1))
              echo "Indexed: $FILE"
            fi

            REQUEST_ID=$((REQUEST_ID + 1))
          done < /tmp/changed_files.txt

          echo ""
          echo "=== RAG Content Sync Complete ==="
          echo "Indexed $INDEXED files to RAG content collection."
          if [ "$FAILED" -gt 0 ]; then
            echo "Failed: $FAILED files."
            exit 1
          fi
