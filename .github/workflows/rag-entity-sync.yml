# SOP Template: RAG Entity Sync
# Copy to: .github/workflows/rag-entity-sync.yml
# Purpose: On push to main when CLAUDE.md changes, parse it and upsert
#          the corresponding RAG entity via memory_store_entity.
# Auth: Requires RAG_AUTH_TOKEN secret (Bearer auth).
# Target: knowledge_v2 collection, entity_type=repository.

name: RAG Entity Sync

on:
  push:
    branches: [main]
    paths:
      - "CLAUDE.md"
  workflow_dispatch:

jobs:
  sync-entity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse CLAUDE.md and sync to RAG
        env:
          RAG_URL: https://rag-mcp-server-152999532788.europe-west1.run.app/mcp
          RAG_AUTH_TOKEN: ${{ secrets.RAG_AUTH_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Extract repo slug from github.repository (owner/repo → repo)
          REPO_SLUG=$(echo "$REPO_NAME" | awk -F/ '{print $NF}')

          # Read CLAUDE.md content (truncate to 8000 chars for entity description)
          if [ ! -f CLAUDE.md ]; then
            echo "No CLAUDE.md found — skipping."
            exit 0
          fi
          CLAUDE_CONTENT=$(head -c 8000 CLAUDE.md)

          AUTH_HEADER=""
          if [ -n "$RAG_AUTH_TOKEN" ]; then
            AUTH_HEADER="Authorization: Bearer $RAG_AUTH_TOKEN"
          fi

          # Initialize MCP session
          INIT_RESP=$(curl -sf -D /tmp/headers -X POST "$RAG_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
            -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"rag-entity-sync","version":"1.0"}},"id":1}' \
            2>&1) || true

          SESSION_HEADER=$(grep -i "mcp-session-id" /tmp/headers | tr -d '\r' | awk '{print $2}')
          if [ -z "$SESSION_HEADER" ]; then
            echo "Failed to initialize MCP session."
            echo "Response: $INIT_RESP"
            exit 1
          fi
          echo "MCP Session: $SESSION_HEADER"

          # Send initialized notification
          curl -sf -X POST "$RAG_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "Mcp-Session-Id: $SESSION_HEADER" \
            ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            > /dev/null

          # Build memory_store_entity payload
          # Entity name = repo slug, entity_type = repository
          # Description = full CLAUDE.md content (upsert-by-name deduplicates)
          PAYLOAD=$(jq -n \
            --arg name "$REPO_SLUG" \
            --arg desc "$CLAUDE_CONTENT" \
            --arg repo "$REPO_NAME" \
            '{
              jsonrpc: "2.0",
              method: "tools/call",
              params: {
                name: "memory_store_entity",
                arguments: {
                  input: {
                    name: $name,
                    entity_type: "repository",
                    description: $desc,
                    related_projects: [($repo | split("/") | .[-1])]
                  }
                }
              },
              id: 2
            }')

          RESULT=$(curl -sf -X POST "$RAG_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "Mcp-Session-Id: $SESSION_HEADER" \
            ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
            -d "$PAYLOAD" 2>&1) || true

          echo "RAG Response: $RESULT"

          # Check for errors
          if echo "$RESULT" | grep -q '"isError":true'; then
            echo "Entity sync failed."
            exit 1
          elif echo "$RESULT" | grep -q '"error"'; then
            echo "Entity sync failed."
            exit 1
          fi

          echo ""
          echo "=== RAG Entity Sync Complete ==="
          echo "Entity '$REPO_SLUG' (type: repository) upserted to knowledge_v2."
