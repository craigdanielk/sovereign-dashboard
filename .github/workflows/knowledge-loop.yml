name: Knowledge Loop
on:
  issues:
    types: [closed]
jobs:
  store:
    runs-on: ubuntu-latest
    steps:
      - name: Store event to RAG
        env:
          RAG_ENDPOINT: ${{ secrets.RAG_ENDPOINT }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          curl -X POST "${RAG_ENDPOINT}/tools/memory_store_conversation" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg title "Issue closed: $ISSUE_TITLE" '{
              "input": {
                "messages": [{"role": "system", "content": $title}],
                "project": "sovereign-dashboard",
                "tags": ["github-issue", "auto-closed"]
              }
            }')"
