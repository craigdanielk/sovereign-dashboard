name: Promote Staging to Production

# Triggered by the Sovereign Dashboard /api/promote endpoint
# when Craig approves a staging demo.
#
# Inputs:
#   repo           - target repo in "owner/name" format
#   staging_branch - the branch to merge into main (e.g., "staging/champion-grip")
#   artifact_id    - Supabase artifact ID for audit trail

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repo (owner/name)"
        required: true
        type: string
      staging_branch:
        description: "Staging branch to merge into main"
        required: true
        type: string
      artifact_id:
        description: "Supabase artifact ID"
        required: false
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate inputs
        env:
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_BRANCH: ${{ inputs.staging_branch }}
        run: |
          if [ -z "$INPUT_REPO" ] || [ -z "$INPUT_BRANCH" ]; then
            echo "::error::repo and staging_branch are required"
            exit 1
          fi
          echo "Promoting $INPUT_BRANCH → main in $INPUT_REPO"

      - name: Merge staging branch to main
        env:
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_BRANCH: ${{ inputs.staging_branch }}
          INPUT_ARTIFACT_ID: ${{ inputs.artifact_id }}
          GH_TOKEN: ${{ secrets.COMMAND_CENTRE_GH_TOKEN }}
        run: |
          OWNER=$(echo "$INPUT_REPO" | cut -d/ -f1)
          REPO=$(echo "$INPUT_REPO" | cut -d/ -f2)

          COMMIT_MSG="chore: promote staging demo to production (artifact=${INPUT_ARTIFACT_ID})"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/merges" \
            -d "{
              \"base\": \"main\",
              \"head\": \"${INPUT_BRANCH}\",
              \"commit_message\": \"${COMMIT_MSG}\"
            }")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" = "201" ]; then
            echo "Merged successfully"
          elif [ "$HTTP_STATUS" = "204" ]; then
            echo "Branch already up-to-date with main"
          else
            echo "::error::Merge failed with status $HTTP_STATUS: $BODY"
            exit 1
          fi
